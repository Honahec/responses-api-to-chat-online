services:
  postgres:
    image: postgres:17-alpine
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-bootstrap:
    image: postgres:17-alpine
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      - ./scripts/postgres-bootstrap.sh:/usr/local/bin/postgres-bootstrap.sh:ro
    command: ["sh", "/usr/local/bin/postgres-bootstrap.sh"]
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    build:
      context: .
      target: migrator
    env_file:
      - .env
    environment:
      DATABASE_URL: ${APP_DATABASE_URL:?APP_DATABASE_URL is required}
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully

  app:
    build:
      context: .
      target: runner
    env_file:
      - .env
    environment:
      DATABASE_URL: ${APP_DATABASE_URL:?APP_DATABASE_URL is required}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
